winners-refresh.service|192|timer
sha-weekly-report.service|192|timer
raw-ingest-scan.service|26|timer
research-deepdive.service|26|timer
research-monitor.service|26|timer
qrevo-watch.service|26|timer
gbrain-weekly.service|192|timer
agents-weekly.service|192|timer
agents-monthly.service|792|timer
comments-digest.service|192|timer
creative-feedback-synth.service|192|timer
box-watchdog.service|26|timer
hermes-gateway.service|0|keepalive
creative-command-center.service|0|keepalive
agentic-bots.service|0|keepalive
