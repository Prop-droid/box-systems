# Watchdog job registry (systemd --user units): unit|max_age_hours|type
# max_age_hours = how stale the last run may be before FAIL (26=daily, 192=weekly+slack, 792=monthly+slack)
# type: timer (oneshot via .timer) | keepalive (long-running .service)
